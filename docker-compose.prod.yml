services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microshophub-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: microshophub-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: microshophub-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      MYSQL_USER: ${MYSQL_USERNAME:-microshophub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: microshophub-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    depends_on:
      - db
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microshophub-queue
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microshophub-scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microshophub-setup
    working_dir: /var/www/html
    command: sh -lc "composer install --no-dev --optimize-autoloader && if ! grep -q '^APP_KEY=base64:' .env 2>/dev/null; then php artisan key:generate --force; fi"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    depends_on:
      - db
    profiles:
      - setup
    restart: "no"

volumes:
  db_data:
