services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      MYSQL_USER: ${MYSQL_USERNAME:-microshophub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    depends_on:
      - db
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
    depends_on:
      - db
      - app
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
    depends_on:
      - db
      - app
    restart: unless-stopped

  setup:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: sh -lc "composer install --no-dev --optimize-autoloader && npm install && npm run build"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - db
    restart: "no"

volumes:
  db_data:
