services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      MYSQL_USER: ${MYSQL_USERNAME:-microshophub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    restart: unless-stopped

  setup:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: sh -lc "if [ ! -f .env ] && [ -f .env.example ]; then cp .env.example .env; fi && if [ -f .env ] && ! grep -q '^APP_KEY=base64:' .env 2>/dev/null; then APP_KEY_VALUE=\"base64:$(php -r 'echo base64_encode(random_bytes(32));')\"; if grep -q '^APP_KEY=' .env 2>/dev/null; then sed -i \"s|^APP_KEY=.*|APP_KEY=$$APP_KEY_VALUE|\" .env; else printf '\nAPP_KEY=%s\n' \"$$APP_KEY_VALUE\" >> .env; fi; fi && composer install --no-dev --optimize_autoloader"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SKIP_DB_WAIT: "1"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE_NAME:-microshophub}
      DB_USERNAME: ${MYSQL_USERNAME:-microshophub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-microshophub}
    restart: "no"

volumes:
  db_data:
